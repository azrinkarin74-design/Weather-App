<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Weather App</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="forecast-container" class="forecast-grid hidden"></div>
    <div class="weather-container">
        <div class="search-box">
            <button id="location-btn" title="Use My Location"><i class="fas fa-map-marker-alt"></i></button>
            <div class="autocomplete-wrapper">
                <input type="text" id="city-input" placeholder="Search city (e.g., Dhaka)..." autocomplete="off">
                <div id="suggestions" class="suggestions-list"></div>
            </div>
            <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>

        <div id="loading" class="hidden">Fetching weather data...</div>

        <div id="weather-card" class="hidden">
            <img src="" alt="weather icon" id="weather-icon">
            <h1 id="temp">--°C</h1>
            <h2 id="city-name">City Name</h2>
            <p id="description">Weather condition</p>
            
            <div class="details">
                <div class="col">
                    <i class="fas fa-water"></i>
                    <div>
                        <p id="humidity">--%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <i class="fas fa-wind"></i>
                    <div>
                        <p id="wind">-- km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
